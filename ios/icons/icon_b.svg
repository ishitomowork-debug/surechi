<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowB">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgB)"/>

  <!-- Left circle -->
  <circle cx="400" cy="512" r="220" fill="white" opacity="0.25" filter="url(#shadowB)"/>
  <!-- Right circle -->
  <circle cx="624" cy="512" r="220" fill="white" opacity="0.25" filter="url(#shadowB)"/>

  <!-- Circle outlines -->
  <circle cx="400" cy="512" r="220" fill="none" stroke="white" stroke-width="12" opacity="0.7"/>
  <circle cx="624" cy="512" r="220" fill="none" stroke="white" stroke-width="12" opacity="0.7"/>

  <!-- Intersection highlight -->
  <clipPath id="leftCircle">
    <circle cx="400" cy="512" r="220"/>
  </clipPath>
  <circle cx="624" cy="512" r="220" fill="white" opacity="0.3" clip-path="url(#leftCircle)"/>

  <!-- Heart in the intersection -->
  <g filter="url(#shadowB)">
    <path d="M512 490
             C512 490 478 455 454 455
             C430 455 410 473 410 497
             C410 540 460 572 512 610
             C564 572 614 540 614 497
             C614 473 594 455 570 455
             C546 455 512 490 512 490 Z"
          fill="white"/>
  </g>
</svg>
