<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background gradient: warm pink to rose -->
  <defs>
    <linearGradient id="bgA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B9D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C2185B;stop-opacity:1" />
    </linearGradient>
    <filter id="shadowA" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgA)"/>

  <!-- Heart shape (centered, upper half) -->
  <g filter="url(#shadowA)">
    <path d="M512 380
             C512 380 420 290 340 290
             C260 290 200 350 200 430
             C200 560 360 650 512 750
             C664 650 824 560 824 430
             C824 350 764 290 684 290
             C604 290 512 380 512 380 Z"
          fill="white" opacity="0.95"/>
  </g>

  <!-- Location pin (bottom center, overlapping heart) -->
  <g filter="url(#shadowA)">
    <!-- Pin circle -->
    <circle cx="512" cy="680" r="70" fill="#FF6B9D" stroke="white" stroke-width="12"/>
    <!-- Pin tail -->
    <path d="M472 738 L512 830 L552 738 Z" fill="#FF6B9D"/>
    <!-- Inner dot -->
    <circle cx="512" cy="680" r="28" fill="white"/>
  </g>
</svg>
